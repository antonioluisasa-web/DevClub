<!-- iFrame em HTML -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site iFrame</title>
</head>

<body>
    <h1>Site iFrame</h1>
    <p>Este é um site de exemplo para demonstrar o uso de iFrame em HTML.</p>

    <figure style="margin-inline:5px auto; text-align:center; display:inline-block; max-width:50%; border:2px solid #000; padding:1px;">
    <iframe 
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/8GAoJ9LbIWs?si=rV0gDnMr6L_0HefP"
        title="YouTube video player" 
        frameborder="2"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen
        aria-describedby="Minha historia!">
    </iframe>
    <figcaption style="text-align:center; margin-top:8px; font-weight:bold;">Minha história!</figcaption>
</figure>

    <figure style="border:1px solid #000; margin:5px auto; padding:10px; text-align:center; display:inline-block; max-width:100%;">
        <figcaption style="margin-bottom:8px; font-weight:bold;">Localização IMTech</figcaption>
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d369.0801088279358!2d-38.45296591239982!3d-12.981999947052264!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x7161bb32e0fa6a7%3A0xb291b2b860efba6f!2sTancredo%20Neves%20Trade%20Center!5e1!3m2!1spt-BR!2sbr!4v1779401381298!5m2!1spt-BR!2sbr"
            width="300" 
            height="150" 
            style="border:1px solid #000;"
            allowfullscreen="" 
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
            title="Localização IMTech"
            aria-describedby="Localização">
        </iframe>
    </figure>   
</body>

</html>
