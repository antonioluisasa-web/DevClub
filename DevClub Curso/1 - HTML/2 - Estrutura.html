<!DOCTYPE html>

<html lang="pt-br"> <!-- A tag <html> é a raiz de um documento HTML e deve envolver todo o conteúdo da página. O atributo lang="pt-br" indica que o idioma principal do conteúdo é o português do Brasil. Isso é importante para acessibilidade e para os mecanismos de busca entenderem o idioma da página. -->
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Meu site Boladão</title>
    </head>
    
    <body>
        <h1> Escrever meu primeiro site </h1>
        <p> Olá, seja bem-vindo ao meu site! </p>
        <button> Clique aqui </button>
    </body>
</html>
